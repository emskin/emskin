name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Uses the default GITHUB_TOKEN. This opens/updates the Release
          # PR automatically; after you merge it, tag + GitHub Release may
          # need to be created manually with `gh release create vX.Y.Z
          # --target <merge-sha>` (release-please sometimes aborts with
          # GITHUB_TOKEN and tags it creates don't trigger downstream
          # workflows anyway). A fine-grained PAT in secrets.RELEASE_PLEASE_TOKEN
          # would close that loop, but the manual step is short enough.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
