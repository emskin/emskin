name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libinput-dev \
            libgbm-dev \
            libseat-dev \
            libpixman-1-dev \
            libssl-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinput-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xkb-dev \
            libxcb-dpms0-dev \
            libxcb-res0-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype-dev

      - name: Install Rust toolchain
        working-directory: emskin
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            emskin/target
          key: ${{ runner.os }}-release-${{ hashFiles('emskin/Cargo.lock', 'emskin/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Build release
        working-directory: emskin
        run: cargo build --release

      - name: Strip binary
        run: strip emskin/target/release/emskin

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          staging=$(mktemp -d)
          cp emskin/target/release/emskin "$staging/"
          cp LICENSE "$staging/"
          tar czf emskin-${{ steps.version.outputs.version }}-x86_64.tar.gz -C "$staging" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: emskin-${{ steps.version.outputs.version }}-x86_64.tar.gz
