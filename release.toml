# cargo-release configuration
# Run: cargo release <patch|minor|major|X.Y.Z> --execute
# See https://github.com/crate-ci/cargo-release for reference.

publish = false
push = true
tag-prefix = ""
tag-name = "v{{version}}"
pre-release-commit-message = "chore: release {{version}}"
consolidate-commits = true
shared-version = true

# cargo-release natively bumps each workspace member's [package].version, but
# two values here are workspace-level literals that need explicit sync:
#   1. [workspace.package].version in the root Cargo.toml (inherited by
#      effect-core / effect-plugins / emskin-bar via version.workspace = true)
#   2. [package].version in crates/emskin/Cargo.toml (literal because cargo-aur
#      0.x doesn't understand workspace inheritance)
# Both lines carry the `# x-release-please-version` marker (retained from the
# earlier release-please setup) as a stable search anchor.
pre-release-replacements = [
  { file = "Cargo.toml",
    search = 'version = "[^"]+" # x-release-please-version',
    replace = 'version = "{{version}}" # x-release-please-version',
    min = 1, max = 1 },
  { file = "crates/emskin/Cargo.toml",
    search = 'version = "[^"]+" # x-release-please-version',
    replace = 'version = "{{version}}" # x-release-please-version',
    min = 1, max = 1 },
]

# Regenerate CHANGELOG.md from conventional commits before the release commit.
# The hook runs once per package, but `-o` overwrite (no `--prepend`) keeps it
# idempotent; every invocation produces the same content.
pre-release-hook = ["git-cliff", "-o", "CHANGELOG.md", "--tag", "v{{version}}"]
